name: Stellar Governance Hub CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test frontend
        run: pnpm test

      - name: Lint frontend
        run: pnpm lint

      - name: Build frontend
        run: pnpm build

  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts/governance
            contracts/reputation

      - name: Install Stellar CLI system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --version 27.0.0

      - name: Show Stellar CLI version
        run: stellar --version

      - name: Test governance contract
        working-directory: contracts/governance
        run: cargo test --locked

      - name: Build governance contract
        working-directory: contracts/governance
        run: stellar contract build

      - name: Test reputation contract
        working-directory: contracts/reputation
        run: cargo test --locked

      - name: Build reputation contract
        working-directory: contracts/reputation
        run: stellar contract build
